<!doctype html>
<html lang="pt-br" class="indigo lighten-5">
  <head>
    <meta charset="UTF-8" />
    <title>Controle Financeiro V3</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      type="text/css"
      rel="stylesheet"
      href="materialize/css/materialize.min.css"
      media="screen,projection"
    />

    <!--Let browser know website is optimized for mobile-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      .rounded-m {
        border-radius: 20px;
      }

      .p-m {
        padding: 8px 20px !important;
      }

      @media screen and (max-width: 600px) {
        .pb-m {
          padding-bottom: 3rem !important;
        }
      }

      .mr-2 {
        margin-right: 8px;
      }

      input[type="date"]::-webkit-calendar-picker-indicator {
        display: none;
        -webkit-appearance: none;
      }

      input[type="date"]::-moz-calendar-picker-indicator {
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="row">
        <form class="card col s12 white" name="cadastro">
          <div class="card-image">
            <img src="konta_banner.png" alt="Logomarca konta" />
          </div>
          <div class="input-field col s12 m6 l4 show-hide">
            <input class="validate datepicker" type="text" id="data" />
            <label class="active" for="data">Data</label>
          </div>
          <div class="input-field col s12 m6 l4 show-hide">
            <input type="text" id="descricao" class="validate" />
            <label class="active" for="descricao">Descrição</label>
          </div>
          <div class="input-field col s12 m6 l4 show-hide">
            <input type="number" class="validate" id="valor" step="0.01" />
            <label class="active" for="valor">Valor</label>
          </div>
          <div class="input-field col s12 m6 l4 show-hide">
            <i class="material-icons prefix">tune</i>
            <select class="icons validate" id="tipo" onchange="carregar()">
              <optgroup label="Tipo/Filtro">
                <option value="Receita">Receita</option>
                <option value="Despesa">Despesa</option>
              </optgroup>
              <optgroup label="Filtro">
                <option selected>Todos</option>
              </optgroup>
            </select>
          </div>
          <div class="input-field col s12 m6 l4 show-hide">
            <i class="material-icons prefix">tune</i>
            <select id="categoria" onchange="carregar()">
              <optgroup label="Categoria/Filtro">
                <option>Alimentação</option>
                <option>Cartão</option>
                <option>Moradia</option>
                <option>Transporte</option>
                <option>Salário</option>
                <option>Saúde</option>
                <option>Outros</option>
              </optgroup>
              <optgroup label="Filtro">
                <option selected>Todos</option>
              </optgroup>
            </select>
          </div>

          <div class="input-field col s12 m6 l4">
            <button
              class="btn waves-effect waves-light right show-hide"
              type="button"
              id="adicionarBtn"
              onclick="adicionar()"
              style="display: inline-block"
            >
              Gravar
              <i class="material-icons right">save</i>
            </button>
            <button
              class="btn-flat btn-floating waves-effect secondary-content left"
              type="button"
              onclick="showHideCadastro()"
              style="display: inline-block"
            >
              <i
                class="material-icons blue-text text-darken-4 right"
                id="collapseCadastro"
                >expand_less</i
              >
            </button>

            <button
              class="btn waves-effect waves-light amber darken-3 right"
              type="button"
              id="alterarBtn"
              onclick=""
              style="display: none"
            >
              Alterar
              <i class="material-icons right">edit</i>
            </button>

            <button
              class="btn waves-effect waves-light right"
              type="button"
              id="cancelarBtn"
              onclick="limpar()"
              style="display: none"
            >
              <i class="material-icons right">cancel</i>
            </button>
          </div>
        </form>
      </div>

      <div class="row">
        <div class="col s12 m3 input-field">
          <h5
            class="blue-text text-darken-4 col valign-wrapper"
            style="padding: 5px 0; margin: 0"
          >
            Resumo
          </h5>
          <button
            class="btn-flat btn-floating waves-effect secondary-content left"
            type="button"
            onclick="prevMonth()"
            style="display: inline-block"
          >
            <i
              class="material-icons blue-text text-darken-4 right"
              id="collapseCadastro"
              >navigate_before</i
            >
          </button>
          <button
            class="btn-flat btn-floating waves-effect secondary-content left"
            type="button"
            onclick="nextMonth()"
            style="display: inline-block"
          >
            <i
              class="material-icons blue-text text-darken-4 right"
              id="collapseCadastro"
              >navigate_next</i
            >
          </button>
        </div>

        <div class="col s12 m9 l9 pb-m">
          <div class="col s12 m4 grey-text">
            <div class="input-field inline">
              <input
                type="text"
                class="datepicker"
                id="dataInicio"
                placeholder="De"
                onchange="carregar()"
              />
            </div>
          </div>
          <div class="col s12 m4 grey-text">
            <div class="input-field inline">
              <input
                type="text"
                class="datepicker"
                placeholder="Até"
                id="dataFim"
                onchange="carregar()"
              />
            </div>
          </div>
          <div class="col s12 m4 grey-text">
            <div class="input-field">
              <label>
                <input
                  class="filled-in"
                  id="saldoReal"
                  type="checkbox"
                  onclick="showSaldoReal(this.checked)"
                />
                <span>Saldo Real</span>
              </label>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col s12 m6 l3">
            <div class="card-panel col s12 rounded-m p-m">
              <div class="card-content">
                <small class="card-title grey-text">Saldo Atual</small>
                <div class="row blue-text text-darken-4">
                  <div class="col s8">
                    <h6>R$ <span id="saldo">0.00</span></h6>
                  </div>
                  <div class="col s4">
                    <h6 class="right">
                      <i class="material-icons">account_balance_wallet</i>
                    </h6>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="col s12 m6 l3">
            <div class="card-panel col s12 rounded-m p-m">
              <div class="card-content">
                <small class="card-title grey-text">Receitas</small>
                <div class="row green-text text-darken-2">
                  <div class="col s8">
                    <h6>R$ <span id="totalReceitas">0.00</span></h6>
                  </div>
                  <div class="col s4">
                    <h6 class="right">
                      <i class="material-icons">monetization_on</i>
                    </h6>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="col s12 m6 l3">
            <div class="card-panel col s12 rounded-m p-m">
              <div class="card-content">
                <small class="card-title grey-text">Despesas</small>
                <div class="row red-text text-darken-2">
                  <div class="col s8">
                    <h6>R$ <span id="totalDespesas">0.00</span></h6>
                  </div>
                  <div class="col s4">
                    <h6 class="right">
                      <i class="material-icons">add_shopping_cart</i>
                    </h6>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="col s12 m6 l3">
            <div class="card-panel col s12 rounded-m p-m">
              <div class="card-content">
                <small class="card-title grey-text">Saldo Futuro</small>
                <div class="row blue-text text-darken-1">
                  <div class="col s8">
                    <h6>R$ <span id="saldoFuturo">0.00</span></h6>
                  </div>
                  <div class="col s4">
                    <h6 class="right">
                      <i class="material-icons">insert_invitation</i>
                    </h6>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <table class="highlight responsive-table">
        <thead>
          <tr>
            <th>Data</th>
            <th>Descrição</th>
            <th>Categoria</th>
            <th>Valor</th>
            <th>Tipo</th>
            <th>Pago</th>
            <th>Ação</th>
          </tr>
        </thead>

        <tbody id="lista"></tbody>
      </table>

      <canvas id="grafico" height="100"></canvas>

      <br />

      <form action="#" class="row right">
        <div class="file-field input-field inline">
          <button
            type="button"
            class="btn waves-effect waves-light"
            onclick="exportarBackup()"
          >
            Exportar Backup
            <i class="material-icons right">backup</i>
          </button>
        </div>

        <div class="file-field input-field inline">
          <div class="btn-small">
            <span
              >importar Backup
              <i class="material-icons right">cloud_download</i></span
            >
            <input
              type="file"
              id="importarArquivo"
              onchange="importarBackup(event)"
            />
          </div>
          <div class="file-path-wrapper">
            <input
              class="file-path validate"
              type="text"
              style="margin-bottom: 0"
            />
          </div>
        </div>
      </form>
      <!-- <input
        type="file"
        id="importarArquivo"
        onchange="importarBackup(event)"
      /> -->
    </div>

    <!--JavaScript at end of body for optimized loading-->
    <script
      type="text/javascript"
      src="materialize/js/materialize.min.js"
    ></script>

    <script type="text/javascript" src="components.js"></script>

    <script type="text/javascript" src="index.js"></script>
  </body>
</html>
